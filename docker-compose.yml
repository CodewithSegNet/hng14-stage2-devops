version: "3.9"

services:
  redis:
    image: redis:7-alpine
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-net
    ports:
      - "8000:8000"

  worker:
    build: ./worker
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-net

  frontend:
    build: ./frontend
    environment:
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_started
    networks:
      - app-net
    ports:
      - "3000:3000"

networks:
  app-net: