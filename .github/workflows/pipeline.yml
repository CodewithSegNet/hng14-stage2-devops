name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python Lint
        run: |
          pip install flake8
          flake8 api worker

      - name: JS Lint
        run: |
          cd frontend
          npm install
          npx eslint .

      - name: Docker Lint
        uses: hadolint/hadolint-action@v3

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3

      - name: Install deps
        run: |
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest --cov=api

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3

      - name: Build images
        run: |
          docker build -t api:${{ github.sha }} ./api
          docker build -t worker:${{ github.sha }} ./worker
          docker build -t frontend:${{ github.sha }} ./frontend

  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'api:${{ github.sha }}'
          severity: 'CRITICAL'
          exit-code: '1'

  integration:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v3

      - name: Start services
        run: docker-compose up -d

      - name: Test flow
        run: |
          sleep 10
          curl -X POST http://localhost:3000/submit

      - name: Cleanup
        run: docker-compose down

  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Fake deploy (rolling simulation)
        run: |
          echo "Deploying..."