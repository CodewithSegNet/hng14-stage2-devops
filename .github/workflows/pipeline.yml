name: CI/CD Pipeline

on:
  push:
    branches: ["main", "dev"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python code with flake8
        run: flake8 api/ worker/

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint JavaScript with ESLint
        working-directory: frontend
        run: npx eslint .

      - name: Pull Hadolint image
        run: docker pull hadolint/hadolint

      - name: Lint API Dockerfile
        run: docker run --rm -i hadolint/hadolint < api/Dockerfile

      - name: Lint Frontend Dockerfile
        run: docker run --rm -i hadolint/hadolint < frontend/Dockerfile

      - name: Lint Worker Dockerfile
        run: docker run --rm -i hadolint/hadolint < worker/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt

      - name: Run pytest with coverage
        run: |
          pytest api/tests/ --cov=api --cov-report=xml:coverage.xml --cov-report=html:coverage-html -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage-html/

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move Docker layer cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t api:${{ github.sha }} ./api

      - name: Build Worker image
        run: docker build -t worker:${{ github.sha }} ./worker

      - name: Build Frontend image
        run: docker build -t frontend:${{ github.sha }} ./frontend

      - name: Scan API image with Trivy (SARIF report)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif

      - name: Scan Worker image with Trivy (SARIF report)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: worker:${{ github.sha }}
          format: sarif
          output: trivy-worker.sarif

      - name: Scan Frontend image with Trivy (SARIF report)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: "*.sarif"

      - name: Fail on CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api:${{ github.sha }}
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  integration:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make integration test executable
        run: chmod +x integration-test.sh

      - name: Run integration tests
        timeout-minutes: 5
        run: ./integration-test.sh

      - name: Teardown services
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build new images
        run: |
          docker build -t api:latest ./api
          docker build -t worker:latest ./worker
          docker build -t frontend:latest ./frontend

      - name: Start new stack
        run: docker compose up -d --build

      - name: Wait for health checks (60s timeout)
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8000/health; then
              echo ""
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting for API... attempt $i/12"
            sleep 5
          done
          echo "Health check failed after 60s"
          exit 1

      - name: Verify deployment success
        run: curl -f http://localhost:8000/health

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed - rolling back"
          docker compose down
          exit 1