name: CI/CD Pipeline

on:
  push:
    branches: ["main", "dev"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---------- Python Lint ----------
      - name: Python Lint
        run: |
          pip install flake8
          flake8 api worker

      # ---------- JS Lint ----------
      - name: JS Lint
        run: |
          cd frontend
          npm install
          npx eslint .

      # ---------- FIXED Docker Lint (NO ACTION) ----------
      - name: Install Hadolint
        run: |
          docker pull hadolint/hadolint

      - name: Lint API Dockerfile
        run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile

      - name: Lint Worker Dockerfile
        run: |
          docker run --rm -i hadolint/hadolint < worker/Dockerfile

      - name: Lint Frontend Dockerfile
        run: |
          docker run --rm -i hadolint/hadolint < frontend/Dockerfile


  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest --cov=api


  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: |
          docker build -t api:${{ github.sha }} ./api
          docker build -t worker:${{ github.sha }} ./worker
          docker build -t frontend:${{ github.sha }} ./frontend


  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1


  integration:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker-compose up -d --build

      - name: Wait
        run: sleep 15

      - name: Test API
        run: |
          curl -X POST http://localhost:8000/jobs

      - name: Cleanup
        if: always()
        run: docker-compose down


  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy
        run: echo "Rolling deploy simulation complete"